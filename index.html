<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">

    <!-- SEO & Metadata -->
    <title>NammaRide</title>
    <meta name="description"
        content="The ultimate guide for Namma Metro (Bengaluru Metro). View interactive maps, calculate ticket prices, find train timings, and plan your journey across Purple, Green, and Yellow lines.">
    <meta name="keywords"
        content="bengaluru metro, metro map, blr metro, bengaluru metro map, metro fare calculator, namma metro price, bangalore metro map, purple line stations, green line, yellow line, bmrcl fare, metro map bengalore, namma metro, namma metro app, namma ride, namma ride map, namma metro price">
    <meta name="robots" content="index, follow">
    <meta name="author" content="NammaRide">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="NammaRide">
    <meta property="og:description"
        content="Plan your Bengaluru Metro trip with ease. Accurate fare calculator, live route maps, and station details for NammaRide.">
    <meta property="og:site_name" content="NammaRide">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NammaRide">
    <meta name="twitter:description"
        content="Navigate Bengaluru with NammaRide. Interactive Metro Map, Real-time Fare Calculator, and Route Planner.">

    <meta name="google-site-verification" content="f03YoQquE88fbC9DVNGgGtjfTgjKO7ZhILGLgoZH2DY" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://nammaride.site/" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NammaRide",
      "applicationCategory": "TravelApplication",
      "description": "Comprehensive guide for Bengaluru Metro (Namma Metro). Features interactive maps, fare calculation, and route planning for all lines.",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": "Metro Map, Fare Calculator, Station Lists, Journey Planner"
    }
    </script>

    <!-- CSS Structure -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/metro-route.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/sections.css">

    <!-- External Libs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151e2e', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <!-- Main Module -->
    <script type="module" src="js/main.js" defer></script>
</head>

<body>

    <div id="app-container" class="app-container">

        <div class="w-full flex-grow flex flex-col relative overflow-hidden">

            <!-- Nearest Station Top Toast (Improved Pill Style) -->
            <div id="nearest-toast" class="absolute top-4 left-1/2 -translate-x-1/2 z-[70] bg-card backdrop-blur-xl shadow-[0_10px_30px_rgba(0,0,0,0.15)] border border-subtle rounded-full px-5 py-3 flex items-center gap-3 transform -translate-y-[150%] transition-all duration-500 max-w-[90%] w-max pointer-events-none">
                <div class="w-6 h-6 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-500">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                </div>
                <span class="text-primary text-sm font-semibold tracking-wide truncate" id="nearest-toast-text"></span>
            </div>

            <!-- Nearest Station Modal (Modern Inspiration) -->
            <div id="nearest-modal" class="absolute inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300">
                <div class="bg-card backdrop-blur-2xl border border-subtle rounded-[40px] sm:rounded-[40px] p-8 w-full max-w-sm shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] transform translate-y-10 sm:translate-y-0 sm:scale-95 transition-all duration-500 opacity-0 pointer-events-none mb-4 sm:mb-0" id="nearest-modal-content">
                    <div class="flex items-center gap-5 mb-8">
                        <div class="w-16 h-16 rounded-3xl bg-indigo-500/10 flex items-center justify-center text-indigo-500 shrink-0 shadow-inner">
                            <i data-lucide="navigation" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-3xl font-black text-primary tracking-tight">Navigate</h3>
                    </div>
                    
                    <div class="space-y-2 mb-10">
                        <p class="text-secondary text-lg leading-snug font-medium" id="nearest-modal-desc">
                            Navigate to <span class="font-bold text-primary" id="nearest-modal-station-name"></span> Metro Station
                        </p>
                        <div class="flex items-center gap-2 text-secondary text-sm font-bold tracking-wider uppercase" id="nearest-modal-distance-wrap">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                            <span id="nearest-modal-distance"></span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <button id="nearest-modal-maps" class="w-full py-4 px-6 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl shadow-[0_12px_24px_-6px_rgba(79,70,229,0.3)] transition-all active:scale-95 text-lg flex items-center justify-center gap-2">
                             <i data-lucide="map" class="w-5 h-5"></i>
                             Open in Maps
                        </button>
                        <button id="nearest-modal-cancel" class="w-full py-4 px-6 bg-card-subtle hover:bg-card-hover text-primary font-bold rounded-2xl transition-all active:scale-95 text-base">Cancel</button>
                    </div>
                    
                    <button id="nearest-modal-close" class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-card-subtle text-secondary hover:text-primary transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <header class="app-header flex justify-between items-center px-4 py-3">
                <h1 class="text-lg font-bold text-primary tracking-wider flex items-center gap-2">
                    <img src="assets/images/logo_app.png" alt="NammaRide Logo" class="w-8 h-8 object-contain">
                    <span class="text-primary font-bold tracking-tight" data-lang-key="appName">NammaRide</span>
                </h1>

                <div class="flex items-center gap-3">
                    <p id="live-clock"
                        class="text-xs text-indigo-300 font-mono font-medium bg-card-subtle px-2 py-1 rounded border border-subtle"></p>
                    
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-1.5 rounded-lg bg-card-subtle border border-subtle text-secondary hover:text-indigo-300 transition-colors" title="Toggle Theme">
                        <i data-lucide="moon" class="w-4 h-4 dark-icon"></i>
                        <i data-lucide="sun" class="w-4 h-4 light-icon hidden"></i>
                    </button>

                    <div class="relative">
                        <select id="language-selector"
                            class="appearance-none bg-card-subtle text-secondary text-xs py-1 px-2 pr-6 rounded border border-subtle focus:outline-none focus:border-indigo-500">
                            <option value="en">EN</option>
                            <option value="hi">HI</option>
                            <option value="kn">KN</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-1 text-secondary">
                            <svg class="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </header>

            <!-- PLAN VIEW (Trip Planner) -->
            <section id="planner-view"
                class="p-6 flex flex-col transition-opacity duration-300 overflow-y-auto custom-scrollbar section-view">

                <div class="w-full max-w-md mx-auto pt-4">
                    <h2 class="text-4xl font-extrabold mb-8 text-[var(--text-primary)] tracking-tight leading-[1.1]"
                        data-lang-key="planYourTrip">Where to go today?</h2>

                    <!-- Compact Inputs Block -->
                    <div id="planner-controls" class="flex flex-col gap-2 mb-6 relative">
                        <!-- Origin -->
                        <div class="relative z-20">
                            <div id="start-station-dropdown" class="w-full"></div>
                            <input type="hidden" id="start-station" value="">
                        </div>

                        <!-- Swap Button Overlapping -->
                        <div
                            class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-center z-30 pointer-events-none">
                            <button id="swap-stations"
                                class="swap-btn pointer-events-auto transform transition-transform active:rotate-180"
                                title="Swap Stations">
                                <i data-lucide="arrow-down-up" class="w-4 h-4 text-secondary"></i>
                            </button>
                        </div>

                        <!-- Destination -->
                        <div class="relative z-10 pt-1">
                            <div id="end-station-dropdown" class="w-full"></div>
                            <input type="hidden" id="end-station" value="">
                        </div>
                    </div>

                    <div id="journey-summary-container"
                        class="bg-card-subtle p-4 rounded-xl border border-subtle animate-fade-in mb-4">
                        <div id="journey-summary" class="text-center text-sm text-secondary font-medium"
                            data-lang-key="selectStationsHint">Select stations to see the fastest route.</div>
                    </div>

                    <!-- I am at... Button (Premium Facelift) -->
                    <div id="find-nearest-btn" class="bg-indigo-500/5 dark:bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/10 dark:border-indigo-500/20 mb-8 flex items-center justify-between cursor-pointer hover:bg-indigo-500/10 dark:hover:bg-indigo-500/20 hover:border-indigo-500/30 transition-all active:scale-[0.97] group shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-indigo-500 flex items-center justify-center text-white shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform duration-300">
                                <i data-lucide="navigation" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="font-bold text-base text-primary tracking-tight" data-lang-key="iamAt">I am at...</div>
                                <div class="text-xs text-secondary font-medium mt-0.5" id="find-nearest-subtitle" data-lang-key="locateNavigate">Find nearest station & navigate</div>
                            </div>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-500 group-hover:bg-indigo-500 group-hover:text-white transition-all">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </div>
                    </div>

                    <div id="board-train-btn-container" class="mt-auto">
                        <button id="board-train-btn" class="btn-primary hidden">
                            <i data-lucide="send" class="w-4 h-4"></i>
                            <span data-lang-key="startLiveJourney">Start Live Journey</span>
                        </button>
                        <p class="text-center text-[10px] text-secondary opacity-70 mt-3" data-lang-key="disclaimer">Disclaimer:
                            Timings and fare are estimates.</p>
                        <p class="text-center text-[10px] text-secondary opacity-50 mt-1" data-lang-key="nonOfficialDisclaimer">This
                            is not an official BMRCL website.</p>
                        
                        <!-- About Developer Link -->
                        <div class="flex justify-center mt-8 mb-2">
                            <a href="https://www.tusharjain.in/" target="_blank" rel="noopener noreferrer"
                               class="inline-flex items-center gap-1.5 text-[9px] text-secondary hover:text-indigo-400 transition-colors duration-200 group">
                                 <i data-lucide="code" class="w-3.5 h-3.5 opacity-60 group-hover:opacity-100"></i>
                                 <span class="border-b border-transparent group-hover:border-indigo-400">Developed by Tushar Jain</span>
                            </a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- MAP VIEW (Live Route) -->
            <section id="map-view" class="hidden flex-grow overflow-y-auto custom-scrollbar section-view bg-card relative">

                <div id="simulation-status"
                    class="sticky top-0 z-30 bg-card backdrop-blur border-b border-subtle p-3 shadow-md">
                </div>
                <ul id="route-list" class="route-timeline mt-4"></ul>
            </section>

            <!-- STATIONS VIEW -->
            <section id="stations-view" class="hidden flex-grow overflow-y-auto custom-scrollbar section-view">
            </section>

            <!-- TIMINGS VIEW -->
            <section id="timings-view" class="hidden flex-grow overflow-y-auto custom-scrollbar section-view">
            </section>

            <!-- EXPLORE VIEW -->
            <section id="explore-view" class="hidden flex-grow overflow-y-auto custom-scrollbar section-view">
            </section>

            <!-- SAFETY VIEW -->
            <section id="safety-view" class="hidden flex-grow overflow-y-auto custom-scrollbar section-view">
            </section>

        </div>

        <!-- BOTTOM NAVIGATION BAR -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-view="plan" id="nav-plan">
                <i data-lucide="route" class="w-5 h-5"></i>
                <span data-lang-key="navPlan">Plan</span>
            </button>
            <button class="nav-item" data-view="stations" id="nav-stations">
                <i data-lucide="map-pin" class="w-5 h-5"></i>
                <span data-lang-key="navStations">Stations</span>
            </button>
            <button class="nav-item" data-view="timings" id="nav-timings">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span data-lang-key="navTimings">Timings</span>
            </button>
            <button class="nav-item" data-view="explore" id="nav-explore">
                <i data-lucide="compass" class="w-5 h-5"></i>
                <span data-lang-key="navExplore">Explore</span>
            </button>
            <button class="nav-item" data-view="safety" id="nav-safety">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                <span data-lang-key="navSafety">Safety</span>
            </button>
        </nav>

        <div id="toast"
            class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-card text-primary px-4 py-2 rounded shadow-lg text-sm opacity-0 transition-opacity duration-300 z-50 border border-subtle">
        </div>
    </div>

</body>

</html>
